plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

import java.util.Properties

// Load Flutter version code and name
def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}
def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '5'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0.5'

// Load keystore properties
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    compileSdkVersion 35
    ndkVersion "25.1.8937393"

    namespace 'com.astrowaypro.astrologer'

    defaultConfig {
        applicationId "com.astrowaypro.astrologer"
        minSdkVersion 24
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true

        ndk {
            abiFilters "armeabi-v7a","arm64-v8a"
        }
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    packagingOptions {
        pickFirst 'lib/**/libaosl.so'
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // Agora library
    api 'io.agora.infra:aosl:1.2.13'

    // Firebase
    implementation platform("com.google.firebase:firebase-bom:33.1.0")
    implementation('com.google.firebase:firebase-auth') {
        exclude module: "play-services-safetynet"
    }

    // MultiDex
    implementation 'androidx.multidex:multidex:2.0.1'

    // Desugaring for Java 8 features
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'

    // OneSignal
    implementation 'com.onesignal:OneSignal:5.1.1'
}

// Apply Google services plugin
apply plugin: 'com.google.gms.google-services'

// ⚠️ IMPORTANT: Do NOT attempt to set JVM args for R8 directly here.
// Gradle JVM args in gradle.properties control R8 memory.
